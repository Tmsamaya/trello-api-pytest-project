name: API test run

on:
 push:
 pull_request:

jobs:
  api-tests:
   runs-on: ubuntu-latest
   
   steps:
    - name: Check Out Repo
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses:  actions/setup-python@v4
      with:
       python-version: '3.11'
       
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Run tests
      env:
       TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
       TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
      run: pytest 
  
